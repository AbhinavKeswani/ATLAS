<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Atlas</title>
<link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="aurora"><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div></div>
  <div class="rays"></div>
  <div class="vignette"></div>

  <nav class="rail">
    <svg class="logo" viewBox="0 0 40 40" fill="none">
      <circle cx="20" cy="20" r="18" stroke="url(#lg)" stroke-width="2.2"/>
      <path d="M20 6 C12 14, 28 26, 20 34" stroke="var(--blood)" stroke-width="2.4" fill="none" stroke-linecap="round"/>
      <defs><linearGradient id="lg" x1="0" y1="0" x2="40" y2="40"><stop stop-color="var(--blood)"/><stop offset="1" stop-color="var(--violet)"/></linearGradient></defs>
    </svg>
    <div class="tab active" data-view="home" data-label="Home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
    </div>
    <div class="tab" data-view="todos" data-label="Todos">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6h11M9 12h11M9 18h11"/><path d="M4 6l1 1 2-2M4 12l1 1 2-2M4 18l1 1 2-2"/></svg>
    </div>
    <div class="tab" data-view="money" data-label="Money">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1v22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
    </div>
    <div class="tab" data-view="networth" data-label="Net Worth">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l5-6 4 4 8-9"/><path d="M3 21h18"/></svg>
    </div>
    <div class="tab" data-view="picks" data-label="Picks">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4.5"/><circle cx="12" cy="12" r="1"/></svg>
    </div>
    <div class="tab" data-view="soccer" data-label="Soccer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7.2l4.3 3.1-1.6 5H9.3l-1.6-5z"/><path d="M12 3v4.2M20.6 9.1l-4.3 1.2M17.3 20l-2.6-4.7M6.7 20l2.6-4.7M3.4 9.1l4.3 1.2"/></svg>
    </div>
    <div class="tab" data-view="health" data-label="Health">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 8.5C20 5.5 17.5 4 15.5 4 14 4 12.7 4.8 12 6c-.7-1.2-2-2-3.5-2C6.5 4 4 5.5 4 8.5c0 5 8 11 8 11s8-6 8-11Z"/></svg>
    </div>
    <div class="tab" data-view="inbox" data-label="Inbox">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7l9 6 9-6"/><rect x="3" y="5" width="18" height="14" rx="2"/></svg>
    </div>
    <div class="tab" data-view="meetings" data-label="Meetings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v4M16 2v4M3 10h18"/><rect x="3" y="4" width="18" height="18" rx="2"/></svg>
    </div>
    <div class="tab" data-view="profile" data-label="Profile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.6-7 8-7s8 3 8 7"/></svg>
    </div>
    <div class="tab" data-view="resume" data-label="Resume">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M8 13h8M8 17h5"/></svg>
    </div>
    <div class="grow"></div>
    <div class="tab" data-view="settings" data-label="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1.2l2-1.6-2-3.4-2.4 1a7 7 0 0 0-2-1.2L14 2h-4l-.5 2.6a7 7 0 0 0-2 1.2l-2.4-1-2 3.4 2 1.6A7 7 0 0 0 5 12a7 7 0 0 0 .1 1.2l-2 1.6 2 3.4 2.4-1a7 7 0 0 0 2 1.2L10 22h4l.5-2.6a7 7 0 0 0 2-1.2l2.4 1 2-3.4-2-1.6A7 7 0 0 0 19 12Z"/></svg>
    </div>
    <div class="conn" id="conn" title="engine connection"></div>
  </nav>

  <main class="main">
    <section class="view active" data-view="home"><div class="viewscroll" id="view-home"></div></section>
    <section class="view" data-view="todos"><div class="viewscroll" id="view-todos"></div></section>
    <section class="view" data-view="money"><div class="viewscroll" id="view-money"></div></section>
    <section class="view" data-view="networth"><div class="viewscroll" id="view-networth"></div></section>
    <section class="view" data-view="picks"><div class="viewscroll" id="view-picks"></div></section>
    <section class="view" data-view="soccer"><div class="viewscroll" id="view-soccer"></div></section>
    <section class="view" data-view="health"><div class="viewscroll" id="view-health"></div></section>
    <section class="view" data-view="inbox"><div class="viewscroll" id="view-inbox"></div></section>
    <section class="view" data-view="meetings"><div class="viewscroll" id="view-meetings"></div></section>
    <section class="view" data-view="profile"><div class="viewscroll" id="view-profile"></div></section>
    <section class="view" data-view="resume"><div class="viewscroll" id="view-resume"></div></section>
    <section class="view" data-view="settings"><div class="viewscroll" id="view-settings"></div></section>
  </main>

  <div class="modal-backdrop" id="modal"></div>
  <div class="drawer-scrim" id="drawer-scrim"></div>
  <aside class="drawer" id="drawer"></aside>
  <div class="toast" id="toast"></div>
  <script src="/static/app.js"></script>
</body>
</html>
